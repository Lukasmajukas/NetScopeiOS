# XcodeGen spec — turns this folder into NetScope.xcodeproj.
#   brew install xcodegen      # one time
#   cd NetScopeiOS && xcodegen generate && open NetScope.xcodeproj
#
# (If you'd rather not use XcodeGen, see README.md for the manual route.)
name: NetScope
options:
  bundleIdPrefix: com.netscope
  deploymentTarget:
    iOS: "27.0"
  createIntermediateGroups: true
  groupSortPosition: top

targets:
  NetScope:
    type: application
    platform: iOS
    deploymentTarget: "27.0"
    sources:
      - path: NetScope
    settings:
      base:
        PRODUCT_NAME: NetScope
        PRODUCT_BUNDLE_IDENTIFIER: com.netscope.ios
        MARKETING_VERSION: "1.1"
        CURRENT_PROJECT_VERSION: "3"
        INFOPLIST_FILE: NetScope/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        TARGETED_DEVICE_FAMILY: "1"        # iPhone
        SWIFT_VERSION: "5.0"
        IPHONEOS_DEPLOYMENT_TARGET: "27.0"
        CODE_SIGN_STYLE: Automatic
        ENABLE_USER_SCRIPT_SANDBOXING: YES
        # Signing team — required for device builds. Without it, regenerating the
        # project drops the team and on-device builds fail with a signing error.
        DEVELOPMENT_TEAM: 68MUVS35CH
